  <div class="gridlist" 
    cdkDropList
    [cdkDropListSortingDisabled]="true"
    [style.min-height] = (this.tileManager.tileOuterSize)
    [style.min-width] = (this.tileManager.tileOuterSize)
  
    cdkDropListOrientation="mixed"
    (cdkDropListDropped)="onDropped($event)"
    >
    @for (tiles of items(); track tiles.id) {
      <expandable-tile 
        [title]="tiles.title" 
        [id]="tiles.id"
      />
    }
  </div>
  @if(this.tileManager.isOverlayExpanded()){
    <app-expanded-overlay></app-expanded-overlay>
  }
