<div class="nav-bar">
    <button class = "start" (click)="isOpen = !isOpen" type="button" cdkOverlayOrigin #origin="cdkOverlayOrigin">
        Start
    </button>
</div>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="origin"
  [cdkConnectedOverlayOpen]="isOpen"
  (detach)="isOpen = false"
>
  <ul class="example-list">
    @for (tile of tileManager.items(); track tile.id) {
        @if(tile.isVisible){
            <button (click)="this.tileManager.openOverlay(tile.id)">{{tile.title}}</button>
        }
    } 
</ul>
 
</ng-template>
