<nav class="nav-bar" cdkOverlayOrigin #origin="cdkOverlayOrigin">
    <button class = "start" (click)="isOpen = !isOpen" type="button">
        Start
    </button>
</nav>

<ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="origin"
    [cdkConnectedOverlayOpen]="isOpen"
    (overlayOutsideClick)="isOpen = false"
    (detach)="isOpen = false"
>
  <ul class="nav-list">
    @for (tile of tileManager.items(); track tile.id) {
        @if(tile.isVisible){
            <button class="item" (click)="selectItem(tile.id)">{{tile.title}}</button>
        }
    } 
</ul>
 
</ng-template>
