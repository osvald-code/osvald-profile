<div cdkDrag class="grid-button" 
    [attr.data-grid-item-id]="id" 
    [cdkDragDisabled]="isVisible()" 
    [style.cursor]="isVisible() ? 'default' : 'pointer'"
    [style.opacity]="isVisible() ? 0 : 1" 
    
    >
    <!-- this is the actual content of the tile -->
    <div [style.width]="innerWidth" [style.height]="innerHeight" [style.margin]="tileManager.tileMargin" class="tile-content" >
        {{title()}} - {{id}};
    </div>
    <!-- this is the placeholder for the dragged element while it's dragged -->
    <div *cdkDragPlaceholder class="grid-button hidden-placeholder">
        <div [style.width]="innerWidth" [style.height]="innerHeight" [style.margin]="tileManager.tileMargin" class="tile-content hidden-placeholder" >
            {{title()}}
        </div>
    </div>
</div>
