<body>
  <div class="gridlist" 
    cdkDropList
    [cdkDropListSortingDisabled]="isDisabled()"
    cdkDropListOrientation="mixed"
    (cdkDropListDropped)="onDropped($event)"
    >
    @for (item of items(); track item.id) {
      <expandable-tile [title]="item.title" [id]="item.id" [style.opacity]="item.id %6 === 0 ? 1 : 0"></expandable-tile>
    }
  </div>
</body>
